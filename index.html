<!DOCTYPE html>
<html lang="nb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#b81c1c">
  <meta name="description" content="Røde Kors utstyrssystem - Lån og returner utstyr">
  <title>Røde Kors - Lån utstyr</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">

    <div id="toast-container"></div>

    <div id="loading-overlay" class="hidden">
      <div class="spinner"></div>
      <p>Laster...</p>
    </div>

    <!-- ===== STUDENT VIEW ===== -->
    <div id="student-view" class="view active">
      <header class="header header-student">
        <div class="header-top">
          <svg class="rc-logo" viewBox="0 0 100 100" aria-label="Røde Kors">
            <rect x="10" y="10" width="80" height="80" rx="8" fill="#fff" stroke="#b81c1c" stroke-width="4"/>
            <rect x="38" y="22" width="24" height="56" rx="4" fill="#b81c1c"/>
            <rect x="22" y="38" width="56" height="24" rx="4" fill="#b81c1c"/>
          </svg>
          <div>
            <h1 class="header-title">Røde Kors</h1>
            <p class="header-subtitle">Lån & returner utstyr</p>
          </div>
        </div>
        <button id="admin-login-btn" class="btn-text btn-admin-link">Admin</button>
      </header>

      <main class="content">
        <section class="card borrower-card">
          <div class="form-group">
            <label for="borrower-name">Ditt navn</label>
            <input type="text" id="borrower-name" class="input" placeholder="Skriv inn navnet ditt" autocomplete="name" required>
          </div>
        </section>

        <section class="card">
          <h2 class="section-title">Tilgjengelige enheter</h2>
          <div id="workstations-list" class="workstations-list">
            <p class="empty-state">Laster enheter...</p>
          </div>
        </section>

        <div id="confirmation" class="confirmation-overlay hidden">
          <div class="confirmation-card card">
            <h3>Bekreft lån</h3>
            <p>Du er i ferd med å låne:</p>
            <ul id="confirmation-details" class="confirmation-details"></ul>
            <div class="confirmation-actions">
              <button id="confirm-borrow-btn" class="btn btn-primary btn-full">Bekreft lån</button>
              <button id="cancel-borrow-btn" class="btn btn-secondary btn-full">Avbryt</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- ===== LOGIN VIEW ===== -->
    <div id="login-view" class="view hidden">
      <header class="header">
        <div class="header-top">
          <button id="back-to-student-btn" class="btn-text back-btn">&larr; Tilbake</button>
          <h1 class="header-title">Admin</h1>
        </div>
      </header>
      <main class="content">
        <section class="card login-card">
          <form id="login-form">
            <div class="form-group">
              <label for="login-email">E-post</label>
              <input type="email" id="login-email" class="input" placeholder="admin@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label for="login-password">Passord</label>
              <input type="password" id="login-password" class="input" placeholder="Passord" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Logg inn</button>
            <p id="login-error" class="error-message hidden"></p>
          </form>
        </section>
      </main>
    </div>

    <!-- ===== ADMIN VIEW ===== -->
    <div id="admin-view" class="view hidden">
      <header class="header">
        <div class="header-row">
          <h1 class="header-title">Admin</h1>
          <button id="logout-btn" class="btn-text">Logg ut</button>
        </div>
      </header>
      <main class="content">
        <ul class="admin-tabs">
          <li><button id="tab-borrows" class="tab-btn active">Utlån</button></li>
          <li><button id="tab-history" class="tab-btn">Historikk</button></li>
          <li><button id="tab-manage" class="tab-btn">Enheter</button></li>
        </ul>

        <section id="tab-borrows-content" class="tab-content active">
          <h2 class="section-title">Utlånt utstyr</h2>
          <div id="active-borrows-list" class="borrows-list"></div>
        </section>

        <section id="tab-history-content" class="tab-content hidden">
          <h2 class="section-title">Historikk</h2>
          <div id="history-list" class="borrows-list"></div>
          <button id="load-more-history-btn" class="btn btn-secondary btn-full hidden">Last flere</button>
        </section>

        <section id="tab-manage-content" class="tab-content hidden">
          <h2 class="section-title">Administrer enheter</h2>
          <div id="workstation-manage-list" class="workstations-manage-list"></div>
          <form id="add-workstation-form" class="add-workstation-form card">
            <h3>Legg til ny enhet</h3>
            <div class="form-group">
              <label for="new-workstation-name">Navn</label>
              <input type="text" id="new-workstation-name" class="input" placeholder="F.eks. PC 4" required>
            </div>
            <div class="form-group">
              <label for="new-workstation-keyboard">Tastatur</label>
              <input type="text" id="new-workstation-keyboard" class="input" placeholder="F.eks. Tastatur 4">
            </div>
            <div class="form-group">
              <label for="new-workstation-mouse">Mus</label>
              <input type="text" id="new-workstation-mouse" class="input" placeholder="F.eks. Mus 4">
            </div>
            <button type="submit" class="btn btn-primary">Legg til</button>
          </form>
        </section>
      </main>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
